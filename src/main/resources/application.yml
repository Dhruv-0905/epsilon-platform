server:
  port: 8080

spring:
  application:
    name: epsilon

  datasource:
    url: jdbc:postgresql://${DB_HOST}/${DB_NAME}?sslmode=require&sslfactory=org.postgresql.ssl.NonValidatingFactory
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 300000
      max-lifetime: 600000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  sql:
    init:
      mode: always

  task:
    scheduling:
      pool:
        size: 2
      thread-name-prefix: epsilon-scheduler-
      shutdown:
        await-termination: true
        await-termination-period: 60s

logging:
  level:
    com.epsilon: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# ===================================================================
# EPSILON PLATFORM CONFIGURATION
# Module 2: The Vault - Recurring Transaction Scheduler
# ===================================================================

epsilon:
  scheduler:
    recurring:
      # Enable/disable recurring transaction scheduler
      # Set to false to disable automatic processing (useful for testing)
      enabled: ${RECURRING_SCHEDULER_ENABLED:true}
      
      # Cron expression for scheduler execution
      # Format: second minute hour day month weekday
      # Default: 0 0 2 * * * (2 AM daily)
      # Examples:
      #   - Every 30 seconds (testing): */30 * * * * *
      #   - Every hour: 0 0 * * * *
      #   - Every day at 2 AM: 0 0 2 * * *
      cron: ${RECURRING_SCHEDULER_CRON:0 0 2 * * *}
      
      # Timezone for scheduler execution
      # Important: Recurring transactions will be processed in this timezone
      # Default: Asia/Kolkata (IST)
      timezone: ${RECURRING_SCHEDULER_TIMEZONE:Asia/Kolkata}
